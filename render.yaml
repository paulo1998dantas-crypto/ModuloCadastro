services:
  - type: web
    name: modulo-cadastro
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: CADASTRO_SAVE_MODE
        value: supabase
      - key: SUPABASE_URL
        value: https://rodtxswtqbsbtukmvobn.supabase.co
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: CADASTRO_REQUIRE_LOGIN
        value: "1"
      - key: CADASTRO_AUTH_MODE
        value: shared
      - key: CADASTRO_REQUIRE_PERSISTENCE
        value: "0"
      - key: CADASTRO_ADMIN_USER
        value: admin
      - key: CADASTRO_ADMIN_PASSWORD
        sync: false
      - key: CADASTRO_SESSION_SECRET
        sync: false
