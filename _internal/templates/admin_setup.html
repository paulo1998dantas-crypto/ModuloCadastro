<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Configurar Admin - Modulo de Cadastro</title>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
    <main class="flex min-h-screen items-center justify-center p-6">
        <section class="w-full max-w-md rounded-2xl border border-slate-800 bg-white p-8 text-slate-900 shadow-2xl">
            <p class="text-xs font-black uppercase tracking-wide text-blue-600">Modulo de Cadastro</p>
            <h1 class="mt-1 text-2xl font-black">Criar acesso admin</h1>
            <p class="mt-2 text-sm font-semibold text-slate-500">
                Defina o usuario e a senha inicial para proteger o sistema.
            </p>

            {% if erro %}
            <div class="mt-5 rounded-lg border border-rose-200 bg-rose-50 p-3 text-sm font-bold text-rose-700">
                {{ erro }}
            </div>
            {% endif %}

            <form method="post" action="/admin/setup" class="mt-6 space-y-4">
                <label class="block space-y-1">
                    <span class="text-xs font-black uppercase tracking-wide text-slate-500">Usuario</span>
                    <input name="username" value="{{ username }}" class="w-full rounded-lg border border-slate-300 p-3 text-sm font-bold outline-none focus:ring-2 focus:ring-blue-500" autocomplete="username" required>
                </label>
                <label class="block space-y-1">
                    <span class="text-xs font-black uppercase tracking-wide text-slate-500">Senha</span>
                    <input id="setup-password" name="password" type="password" class="w-full rounded-lg border border-slate-300 p-3 text-sm font-bold outline-none focus:ring-2 focus:ring-blue-500" autocomplete="new-password" required minlength="6">
                </label>
                <label class="block space-y-1">
                    <span class="text-xs font-black uppercase tracking-wide text-slate-500">Confirmar senha</span>
                    <input id="setup-password-confirm" name="password_confirm" type="password" class="w-full rounded-lg border border-slate-300 p-3 text-sm font-bold outline-none focus:ring-2 focus:ring-blue-500" autocomplete="new-password" required minlength="6">
                </label>
                <label class="inline-flex items-center gap-2 text-sm font-bold text-slate-600">
                    <input id="show-passwords" type="checkbox" class="h-4 w-4 rounded border-slate-300">
                    Mostrar senha digitada
                </label>
                <button type="submit" class="w-full rounded-lg bg-blue-600 px-5 py-3 text-sm font-black text-white transition hover:bg-blue-700">
                    Criar acesso
                </button>
            </form>
        </section>
    </main>

    <script>
        const toggle = document.getElementById("show-passwords");
        const fields = [
            document.getElementById("setup-password"),
            document.getElementById("setup-password-confirm"),
        ];
        toggle?.addEventListener("change", () => {
            fields.forEach((field) => {
                field.type = toggle.checked ? "text" : "password";
            });
        });
    </script>
</body>
</html>
